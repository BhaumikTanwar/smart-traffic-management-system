<!DOCTYPE html>
<html>
<head>
    <title>Smart Traffic Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; background:#f4f6f8; padding:20px; }
        h1 { margin-bottom:20px; }

        .section {
            margin-top:30px;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.08);
        }

        button {
            padding:10px 18px;
            border-radius:6px;
            border:none;
            background:#667eea;
            color:white;
            cursor:pointer;
            margin-right:10px;
        }

        .badge {
            background:#38a169;
            padding:6px 12px;
            border-radius:20px;
            color:white;
            font-weight:bold;
        }

        .cards {
            display:flex;
            gap:20px;
        }

        .card {
            background:#fafafa;
            padding:20px;
            border-radius:10px;
            width:220px;
        }

        .value {
            font-size:24px;
            font-weight:bold;
            margin-top:10px;
        }

        #videoSection { display:none; }
        #videoFeedContainer { display:none; margin-top:20px; }
    </style>
</head>

<body>

<h1>🚦 Smart Traffic Admin Dashboard</h1>

<div class="section">
    <h2>⚙️ System Controls</h2>
    <button onclick="setMode('simulation')">Simulation Mode</button>
    <button onclick="setMode('video')">Video Mode</button>
    <button onclick="window.location.href='/spiderweb'">
        Spiderweb Mode
    </button>
    <span class="badge" id="currentModeBadge">Mode: --</span>
</div>

<div class="section">
    <div class="cards">
        <div class="card">
            Vehicle Count
            <div class="value" id="vehicleCount">--</div>
        </div>

        <div class="card">
            Congestion Level
            <div class="value" id="congestion">--</div>
        </div>
        <div class="card">
            Future Congestion
            <div class="value" id="futureCongestion">--</div>
        </div>

        <div class="card">
            Adaptive Green Time
            <div class="value" id="greenTime">--</div>
        </div>
    </div>
</div>

<div class="section">
    <h2>📊 Traffic Trend</h2>
    <canvas id="trafficChart" height="100"></canvas>
</div>

<div class="section" id="videoSection">
    <h2>🎥 Upload Video for Detection</h2>
    <input type="file" id="videoInput">
    <button onclick="uploadVideo()">Upload</button>

    <div id="videoFeedContainer">
        <img id="videoStream" width="100%" style="display:none;" />
    </div>
</div>

<script>

let vehicleData = [];
let timeLabels = [];

const ctx = document.getElementById('trafficChart').getContext('2d');

const trafficChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: timeLabels,
        datasets: [{
            label: 'Vehicle Count',
            data: vehicleData,
            borderWidth:2,
            tension:0.3
        }]
    },
    options: {
        responsive:true,
        scales:{ y:{ beginAtZero:true } }
    }
});

function setMode(mode) {

    // 🔥 STOP VIDEO STREAM
    const img = document.getElementById("videoStream");

    if(img){
        img.src = "";
    }

    fetch(`/set-mode/${mode}`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("currentModeBadge").innerText =
            "Mode: " + data.current_mode.toUpperCase();

        if(mode === "video"){
            document.getElementById("videoSection").style.display = "block";
        } 
        else {
            document.getElementById("videoSection").style.display = "none";
            document.getElementById("videoFeedContainer").style.display = "none";
        }
    });
}

function uploadVideo(){
    const file = document.getElementById("videoInput").files[0];

    if(!file){
        alert("Select a video first.");
        return;
    }

    const formData = new FormData();
    formData.append("video", file);

    fetch("/upload-video", {
        method:"POST",
        body:formData
    })
    .then(res=>res.json())
    .then(data=>{
        alert("Video Uploaded!");

        const container = document.getElementById("videoFeedContainer");
        container.style.display = "block";

        const img = document.getElementById("videoStream");

        img.style.display = "block";
        img.src = "/video_feed?rand=" + Math.random();
    });
}

function loadTraffic(){
    fetch("/api/traffic-status")
    .then(res=>res.json())
    .then(data=>{

        console.log("API DATA:", data); // 🔍 DEBUG

        document.getElementById("currentModeBadge").innerText =
            "Mode: " + data.current_mode.toUpperCase();

        // VIDEO MODE check
        if(data.current_mode === "video" && data.video_ready === false){
            document.getElementById("vehicleCount").innerText = "--";
            document.getElementById("congestion").innerText = "Waiting for video...";
            document.getElementById("greenTime").innerText = "--";
            return;
        }

        // 🚨 FIX: check if roads exists
        if(!data.roads || data.roads.length === 0){
            console.log("No roads data");
            return;
        }

        const road = data.roads[0];

        document.getElementById("vehicleCount").innerText = road.vehicle_count ?? "--";
        document.getElementById("greenTime").innerText =
            (road.adaptive_green_time ?? "--") + " sec";
        document.getElementById("congestion").innerText =
            road.congestion_level ?? "--";
        document.getElementById("futureCongestion").innerText =
            road.future_congestion ?? "--";

        // Graph
        timeLabels.push(data.timestamp);
        vehicleData.push(road.vehicle_count);

        if(timeLabels.length > 10){
            timeLabels.shift();
            vehicleData.shift();
        }

        trafficChart.update();
    })
    .catch(err => {
        console.error("Fetch error:", err);
    });
}

// Always run updates
setInterval(loadTraffic, 5000);
loadTraffic();

</script>

</body>
</html>
